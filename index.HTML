<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Rifa Online</title>

<meta name="theme-color" content="#4CAF50">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  text-align:center;
  background:#f4f4f4;
}
header{
  background:#4CAF50;
  color:white;
  padding:18px 10px;
}
header h2{margin:0;}
.sub{font-size:14px;margin-top:6px;opacity:0.9;}
.info{
  background:#fff;
  margin:15px;
  padding:12px;
  border-radius:10px;
  font-size:14px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;padding:20px;}
button{
  height:90px;
  font-size:22px;
  border:none;
  border-radius:12px;
  background:#4CAF50;
  color:white;
  cursor:pointer;
  transition: all 0.3s ease;
}
button:disabled {
  cursor: default;
}

/* Botão reservado totalmente amarelo com efeito pulsante */
.reservado {
  position: relative;
  background: #FFD700; /* fundo amarelo completo */
  color: black; /* texto visível */
  border: 3px solid #FFD700;
  overflow: hidden;
  animation: pulsarAmarelo 1.5s ease-in-out infinite;
}

/* Pulsar amarelo */
@keyframes pulsarAmarelo {
  0% { box-shadow: 0 0 5px #FFD700; }
  50% { box-shadow: 0 0 20px #FFD700; }
  100% { box-shadow: 0 0 5px #FFD700; }
}

footer{font-size:13px;padding:15px;color:#555;}
.copy-btn{
  padding:10px 20px;
  font-size:16px;
  border:none;
  border-radius:8px;
  background:#4CAF50;
  color:white;
  cursor:pointer;
  margin-top:8px;
}
input.copy-input{
  font-size:18px;
  text-align:center;
  border:none;
  background:none;
  user-select:text;
  width:180px;
}
</style>
</head>

<body>
<header>
  <h2>🎟️ Rifa Online</h2>
  <div class="sub">Escolha um número e participe!</div>
</header>

<div class="info">
  🍀 <b>Boa sorte a todos os participantes!</b><br><br>
  📅 <b>Sorteio:</b> Domingo, <b>01 de março de 2026</b><br>
  ⏰ <b>Horário:</b> 20:00<br>
  📍 <b>Local:</b> Igreja Batista Frei Solano
</div>

<div class="grid" id="grid"></div>

<div class="info">
  <b>Pagamento via PIX:</b><br>
  <input type="text" class="copy-input" id="pixKey" value="(99) 98843-3063" readonly>
  <br>
  <button id="copyPix" class="copy-btn">Copiar chave PIX</button>
</div>

<footer>Após escolher um número, ele ficará reservado automaticamente.</footer>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDuvs3hPSCrOocEqPKEE_RkM7Ehe8QjOXI",
  authDomain: "rifa-online-c6f75.firebaseapp.com",
  projectId: "rifa-online-c6f75"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const grid = document.getElementById("grid");
const numeroEscolhido = localStorage.getItem("numeroEscolhido");

for(let i = 1; i <= 10; i++){
  const btn = document.createElement("button");
  btn.innerText = i;

  db.collection("numeros").doc(String(i))
    .onSnapshot(doc => {
      const data = doc.data();
      if(data && data.nome){
        btn.innerText = data.nome;
        btn.disabled = true;
        btn.classList.add("reservado"); // fundo amarelo + efeito pulsante
      }
    });

  if(numeroEscolhido) btn.disabled = true;

  btn.onclick = async () => {
    if(localStorage.getItem("numeroEscolhido")){
      alert("Você já escolheu um número.");
      return;
    }

    // Nome obrigatório
    let nome = "";
    while(!nome){
      nome = prompt("Digite seu nome (obrigatório):");
      if(nome === null) return;
    }

    // Telefone obrigatório e válido
    let telefone = "";
    while(true){
      telefone = prompt("Digite seu telefone (somente números, 9 a 11 dígitos, ex: 11987654321):");
      if(telefone === null) return; 
      telefone = telefone.replace(/\D/g,""); 

      if(telefone.length < 9 || telefone.length > 11){
        alert("O telefone deve ter entre 9 e 11 dígitos.");
        continue;
      }
      break;
    }

    telefone = "+55" + telefone;

    await db.collection("numeros").doc(String(i)).set({
      nome: nome,
      telefone: telefone
    }, {merge:true});

    localStorage.setItem("numeroEscolhido", i);
    alert(`Número ${i} reservado com sucesso!\nTelefone registrado: ${telefone}`);
    btn.disabled = true;
    btn.innerText = nome;
    btn.classList.add("reservado"); // amarelo pulsante
  };

  grid.appendChild(btn);
}

// Função para copiar PIX
const copyBtn = document.getElementById("copyPix");
const pixInput = document.getElementById("pixKey");

copyBtn.onclick = () => {
  pixInput.select();
  pixInput.setSelectionRange(0, 99999); 
  document.execCommand("copy");
  alert("Chave PIX copiada para a área de transferência!");
};
</script>
</body>
</html>
